<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anlık Mesajlaşma Odası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2><i class="fa-solid fa-comments"></i> Genel Sohbet Odası</h2>
            <span id="user-badge" class="user-badge">Yükleniyor...</span>
        </div>

        <div id="chat-messages" class="chat-messages">
            </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Mesajınızı yazın..." maxlength="250" autocomplete="off">
            <button id="btn-send" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
