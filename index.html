<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deneme 23</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>

<body>

    <div class="login-container">
        <div id="auth-card" class="login-card">
            <div class="login-header">
                <h2>Hoş Geldin</h2>
                <p>Sohbete katılmak için profilini oluştur</p>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="username-input" placeholder="Adınız Soyadınız..." maxlength="25"
                        autocomplete="off">
                </div>
                <div class="avatar-selection-zone">
                    <p class="section-title"><i class="fa-solid fa-camera"></i> Profil Fotoğrafı</p>
                    <div class="avatar-wrapper">
                        <div class="preview-box">
                            <img id="avatar-preview" src="https://via.placeholder.com/150?text=👤" alt="Önizleme">
                        </div>
                        <label for="profile-file-input" class="btn-upload">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Fotoğraf Seç
                        </label>
                        <input type="file" id="profile-file-input" accept="image/*" onchange="previewFile(event)"
                            style="display: none;">
                    </div>
                </div>
                <button id="btn-login" onclick="handleLogin()">
                    Devam Et <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="lobby-card" class="login-card" style="display: none;">
            <div class="login-header">
                <h2>Oda Seçimi</h2>
                <p id="lobby-welcome-text">Merhaba, ne yapmak istersin?</p>
            </div>

            <div class="lobby-actions">
                <button class="lobby-btn primary-btn" onclick="showView('create')">
                    <i class="fa-solid fa-plus"></i> Yeni Chat Odası Oluştur
                </button>
                <button class="lobby-btn secondary-btn" onclick="showView('join'); loadActiveRooms();">
                    <i class="fa-solid fa-comments"></i> Bir Chate Katıl
                </button>
            </div>

            <div id="view-create-room" class="sub-view" style="display: none;">
                <div class="input-group">
                    <i class="fa-solid fa-font input-icon"></i>
                    <input type="text" id="room-name-input" placeholder="Oda Adı Girin..." maxlength="30">
                </div>
                <button class="lobby-btn success-btn" onclick="createNewRoom()">Odayı Kur ve Giriş Yap</button>
                <button class="back-link-btn" onclick="showView('menu')">Geri Dön</button>
            </div>

            <div id="view-join-room" class="sub-view" style="display: none;">
                <h3>Aktif Sohbet Odaları</h3>
                <div id="rooms-list-container" class="rooms-list-container">
                </div>
                <button class="back-link-btn" onclick="showView('menu')">Geri Dön</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Ayarları
        const firebaseConfig = {
            apiKey: "AIzaSyDQqjQ14nDWzbCzC7abJDOVIxYWbp9qosI",
            authDomain: "yurt-paneli.firebaseapp.com",
            databaseURL: "https://yurt-paneli-default-rtdb.firebaseio.com",
            projectId: "yurt-paneli",
            storageBucket: "yurt-paneli.firebasestorage.app",
            messagingSenderId: "779236033369",
            appId: "1:779236033369:web:9e3eccdb03e8fa9ae78248"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selectedImgB64 = "https://via.placeholder.com/150?text=👤";

        function compressImage(base64Str, maxWidth = 150, maxHeight = 150) {
            return new Promise((resolve) => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } }
                    else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                    const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        function previewFile(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                selectedImgB64 = await compressImage(e.target.result);
                document.getElementById("avatar-preview").src = selectedImgB64;
            };
            reader.readAsDataURL(file);
        }

        // Sayfa Yüklendiğinde Kullanıcı Kayıtlıysa Direkt Lobiyi Göster
        window.onload = function () {
            if (localStorage.getItem("chat_user_name_v5")) {
                document.getElementById("auth-card").style.display = "none";
                document.getElementById("lobby-card").style.display = "block";
                document.getElementById("lobby-welcome-text").innerText = `Merhaba ${localStorage.getItem("chat_user_name_v5")}, ne yapmak istersin?`;
            }
        }

        function handleLogin() {
            let nameInput = document.getElementById("username-input").value.trim();
            if (nameInput === "") { alert("Lütfen geçerli bir isim giriniz!"); return; }

            let userUniqueId = "user_" + Math.random().toString(36).substring(2, 11) + "_" + Date.now();
            localStorage.setItem("chat_user_name_v5", nameInput);
            localStorage.setItem("chat_user_img_v5", selectedImgB64);
            localStorage.setItem("chat_user_uid_v5", userUniqueId);

            document.getElementById("auth-card").style.display = "none";
            document.getElementById("lobby-card").style.display = "block";
            document.getElementById("lobby-welcome-text").innerText = `Merhaba ${nameInput}, ne yapmak istersin?`;
        }

        function showView(view) {
            document.querySelector(".lobby-actions").style.display = view === 'menu' ? 'flex' : 'none';
            document.getElementById("view-create-room").style.display = view === 'create' ? 'block' : 'none';
            document.getElementById("view-join-room").style.display = view === 'join' ? 'block' : 'none';
        }

        // ODA OLUŞTURMA MANTIĞI
        function createNewRoom() {
            const roomName = document.getElementById("room-name-input").value.trim();
            if (!roomName) { alert("Lütfen bir oda adı girin!"); return; }

            const roomId = "room_" + Date.now() + "_" + Math.random().toString(36).substring(2, 7);
            const myUid = localStorage.getItem("chat_user_uid_v5");

            // Firebase'e odayı kaydediyoruz ve kurucuyu atıyoruz
            database.ref('rooms_v5/' + roomId).set({
                id: roomId,
                name: roomName,
                creatorUid: myUid,
                createdAt: Date.now()
            }).then(() => {
                localStorage.setItem("current_room_id", roomId);
                localStorage.setItem("just_logged_in", "true");
                window.location.href = "chat.html";
            });
        }

        // ODALARI LİSTELEME MANTIĞI
        function loadActiveRooms() {
            const container = document.getElementById("rooms-list-container");
            container.innerHTML = "<p style='color:#64748b;'>Odalar yükleniyor...</p>";

            database.ref('rooms_v5').get().then((snapshot) => {
                container.innerHTML = "";
                if (!snapshot.exists()) {
                    container.innerHTML = `<div class="no-room-msg">⚠️ Şu anda aktif chat odası yok. İlk odayı sen oluştur!</div>`;
                    return;
                }

                snapshot.forEach((child) => {
                    const room = child.val();
                    const item = document.createElement("div");
                    item.className = "room-list-item";
                    item.innerHTML = `
                        <div class="room-info">
                            <strong><i class="fa-solid fa-hashtag"></i> ${room.name}</strong>
                        </div>
                        <button class="join-room-btn" onclick="enterRoom('${room.id}')">Katıl <i class="fa-solid fa-door-open"></i></button>
                    `;
                    container.appendChild(item);
                });
            });
        }

        function enterRoom(roomId) {
            localStorage.setItem("current_room_id", roomId);
            localStorage.setItem("just_logged_in", "true");
            window.location.href = "chat.html";
        }
    </script>
</body>

</html>
